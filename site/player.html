<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barwell CC — Player</title>
<script>
// Applied before paint so a stored preference doesn't flash the other theme.
(function(){
  var stored = localStorage.getItem('barwellcc-theme');
  if(stored === 'dark' || stored === 'light') document.documentElement.setAttribute('data-theme', stored);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: light dark;
    --pitch-green: #1E3A2B;
    --pitch-green-dark: #142A1E;
    --cream: #F6F1E4;
    --bg-page: #F6F1E4;
    --card: #FFFDF8;
    --row-even: #F5EFE1;
    --head-bg: #EDE7D6;
    --ink: #201E18;
    --ink-soft: #5B5548;
    --maroon: #7A2E2E;
    --accent: #7A2E2E;
    --accent-underline: rgba(122,46,46,0.35);
    --brass: #B8923A;
    --brass-bright: #D4AF5A;
    --line: #E1D8C0;
    --line-strong: #CBBE9C;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg-page: #161F19; --card: #1F2B23; --row-even: #24312A; --head-bg: #293830;
      --ink: #E9E4D6; --ink-soft: #A3A093; --accent: #E0897C;
      --accent-underline: rgba(224,137,124,0.4); --line: #2E3D33; --line-strong: #415447;
    }
  }
  :root[data-theme="dark"]{
    --bg-page: #161F19; --card: #1F2B23; --row-even: #24312A; --head-bg: #293830;
    --ink: #E9E4D6; --ink-soft: #A3A093; --accent: #E0897C;
    --accent-underline: rgba(224,137,124,0.4); --line: #2E3D33; --line-strong: #415447;
    color-scheme: dark;
  }
  :root[data-theme="light"]{ color-scheme: light; }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ============ MOBILE-FIRST BASE STYLES ============ */
  body{
    margin:0;
    background: var(--bg-page);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background .15s ease, color .15s ease;
  }
  .page{ max-width: 980px; margin: 0 auto; padding: 0 12px 48px; }

  /* ---- Shared site nav (Fixtures / Averages / Stats) + theme toggle ---- */
  .site-nav{ display:flex; align-items:stretch; background: var(--pitch-green-dark); margin: 0 -12px; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
  .site-nav-links{ display:flex; flex:1; }
  .site-nav-links a{
    flex: 1 1 0; text-align:center; padding: 11px 8px;
    font-family:'Inter'; font-weight:600; font-size: 12px; letter-spacing:0.05em; text-transform:uppercase;
    color: rgba(246,241,228,0.62); text-decoration:none; border-bottom: 2px solid transparent;
  }
  .site-nav-links a:hover{ color: var(--cream); }
  .site-nav-links a.active{ color: var(--brass-bright); border-bottom-color: var(--brass); }
  .theme-toggle{
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    width: 42px; border:none; border-left: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: rgba(246,241,228,0.62); cursor:pointer; padding:0;
  }
  .theme-toggle:hover{ color: var(--brass-bright); }
  .theme-toggle svg{ width:16px; height:16px; }
  .theme-toggle .icon-sun{ display:none; }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]) .theme-toggle .icon-sun{ display:block; }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon{ display:none; }
  }
  :root[data-theme="dark"] .theme-toggle .icon-sun{ display:block; }
  :root[data-theme="dark"] .theme-toggle .icon-moon{ display:none; }

  .back-link{
    display:inline-block; font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    text-decoration:none; margin: 14px 0 10px;
  }
  .back-link:hover{ color: var(--accent); }

  /* ---- Player identity plaque (same gradient treatment as Scorecard's match header) ---- */
  .player-header{
    background: linear-gradient(180deg, var(--pitch-green) 0%, var(--pitch-green-dark) 100%);
    color: var(--cream);
    border-radius: var(--radius);
    padding: 18px 16px 16px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .player-header::after{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .player-name{ font-family:'Fraunces', serif; font-weight:700; font-size: 22px; line-height:1.25; position:relative; }
  .player-sub{ font-size: 12px; color: rgba(246,241,228,0.72); margin-top: 5px; position:relative; }

  /* ---- Batting/Bowling view toggle (same component as Averages/Stats) ---- */
  .tabs{ display:flex; gap:6px; margin-bottom: 22px; }
  .tab{
    flex:1 1 0; text-align:center;
    font-size: 13px; font-weight: 600; padding: 9px 12px; border-radius: 999px;
    border: 1px solid var(--line-strong); background: var(--card); color: var(--ink-soft);
    cursor: pointer; transition: all .15s ease;
  }
  .tab:hover{ border-color: var(--pitch-green); color: var(--pitch-green); }
  .tab.active{ background: var(--pitch-green); border-color: var(--pitch-green); color: var(--cream); }

  .section-label{
    font-family: 'Fraunces', serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 8px 2px;
  }

  /* ---- High Scores: top-3 performance tiles ---- */
  .hs-grid{ display:grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 22px; }
  .hs-tile{
    position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: 0 1px 2px rgba(30,58,43,0.04);
  }
  .hs-tile.empty{ color: var(--ink-soft); font-style: italic; font-size: 13px; text-align:center; padding: 22px 16px; }
  .hs-rank{
    position:absolute; top: 12px; right: 12px;
    display:flex; align-items:center; justify-content:center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--pitch-green); color: var(--cream);
    font-family:'Inter'; font-size: 11px; font-weight: 700;
  }
  .hs-figure{ font-family:'Fraunces', serif; font-weight:700; font-size: 26px; color: var(--accent); line-height:1; font-variant-numeric: tabular-nums; }
  .hs-figure .not-out{ color: var(--pitch-green); }
  @media (prefers-color-scheme: dark){ :root:not([data-theme="light"]) .hs-figure .not-out{ color: #4F8C5C; } }
  :root[data-theme="dark"] .hs-figure .not-out{ color: #4F8C5C; }
  .hs-meta{ font-size: 12px; color: var(--ink-soft); margin-top: 7px; line-height: 1.55; }
  .hs-meta strong{ color: var(--ink); font-weight: 600; }
  .hs-link{
    display:inline-block; margin-top: 8px; font-size: 12px; font-weight: 600; color: var(--accent);
    text-decoration:none; border-bottom: 1px solid var(--accent-underline);
  }
  .hs-link:hover{ border-color: var(--accent); }

  /* ---- Team filter (same multi-select as Averages/Stats) ---- */
  .search-card{
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; margin: 26px 0 22px; box-shadow: 0 1px 2px rgba(30,58,43,0.04);
  }
  .filter-row{ display:flex; flex-direction:column; align-items:stretch; gap:8px; }
  .filter-group{ display:flex; flex-direction:column; gap:5px; }
  .filter-label{ font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); }
  .msel{ position:relative; }
  .msel-btn{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    width: 100%; font-family:'Inter'; font-size: 14px; font-weight: 600;
    padding: 9px 12px; border-radius: 6px; border: 1px solid var(--line-strong);
    background: var(--card); color: var(--ink); cursor: pointer;
  }
  .msel-btn:hover{ border-color: var(--pitch-green); }
  .msel.open .msel-btn{ border-color: var(--pitch-green); }
  .msel-arrow{ font-size: 9px; color: var(--ink-soft); transition: transform .15s ease; flex-shrink:0; }
  .msel.open .msel-arrow{ transform: rotate(180deg); }
  .msel-panel{
    display:none; position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:20;
    background: var(--card); border: 1px solid var(--line-strong); border-radius: 8px;
    box-shadow: 0 10px 28px rgba(20,42,30,0.16); padding: 8px;
    max-height: 280px; overflow-y: auto;
  }
  .msel.open .msel-panel{ display:block; }
  .msel-actions{ display:flex; gap:12px; padding: 4px 6px 8px; border-bottom: 1px solid var(--line); margin-bottom: 6px; }
  .msel-action{ background:none; border:none; padding:0; font-size: 11.5px; font-weight: 700; color: var(--accent); cursor: pointer; }
  .msel-action:hover{ text-decoration: underline; }
  .msel-item{ display:flex; align-items:center; gap:8px; padding: 8px 6px; border-radius: 5px; font-size: 14px; cursor: pointer; }
  .msel-item:hover{ background: rgba(30,58,43,0.06); }
  .msel-item input{ accent-color: var(--pitch-green); width: 16px; height: 16px; flex-shrink:0; }

  .results-label{ display:flex; align-items:baseline; justify-content: space-between; margin: 0 2px 8px; }
  .results-count{ font-size: 12px; color: var(--ink-soft); }

  .card{
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 26px; box-shadow: 0 1px 2px rgba(30,58,43,0.04);
  }
  .table-scroll{ position:relative; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius: var(--radius); }
  .table-scroll::after{
    content:""; position:absolute; top:0; right:0; bottom:0; width:28px;
    background: linear-gradient(to right, transparent, rgba(20,42,30,0.10));
    opacity:0; transition: opacity .15s ease; pointer-events:none;
  }
  .table-scroll.has-scroll::after{ opacity:1; }
  table{ width: 100%; min-width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th{
    text-align: right; font-family: 'Inter'; font-weight: 600; font-size: 10.5px;
    letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink-soft);
    padding: 10px 8px; border-bottom: 1px solid var(--line-strong);
    background: var(--head-bg); cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:first-child, td.season{ text-align: left; }
  thead th:hover{ color: var(--pitch-green); }
  thead th .arrow{ display:inline-block; width: 9px; opacity: 0.35; font-size: 9px; }
  thead th.sorted .arrow{ opacity: 1; color: var(--accent); }
  tbody td{
    padding: 9px 8px; text-align: right; font-variant-numeric: tabular-nums;
    border-bottom: 1px solid var(--line); color: var(--ink); white-space: nowrap;
  }
  tbody tr:last-child td{ border-bottom: none; }
  tbody tr:nth-child(even){ background: var(--row-even); }

  thead th:first-child{ position: sticky; left:0; z-index:3; background: var(--head-bg); }
  tbody td:first-child{ position: sticky; left:0; z-index:1; background: var(--card); }
  tbody tr:nth-child(even) td:first-child{ background: var(--row-even); }

  td.season{ font-weight: 600; }
  .not-out{ color: var(--accent); font-weight: 600; }
  tr.career-row{ font-weight: 700; }
  tr.career-row td{ border-bottom: 2px solid var(--line-strong); }
  tr.career-row td:first-child{ background: var(--head-bg); }

  tr.no-records td{
    text-align: center; color: var(--ink-soft); font-style: italic;
    padding: 22px 8px; position: static; background: none;
  }
  .page-message{ text-align:center; color: var(--ink-soft); font-size: 14px; padding: 40px 16px; }

  /* ============ LARGER SCREENS ============ */
  @media (min-width: 640px){
    .page{ padding: 0 20px 64px; }
    .site-nav{ margin: 0 -20px; }
    .site-nav-links a{ flex: none; padding: 12px 26px; font-size: 12.5px; }

    .player-header{ padding: 26px 30px 24px; }
    .player-name{ font-size: 28px; }
    .player-sub{ font-size: 13px; }

    .tabs{ gap:6px; }
    .tab{ flex: none; padding: 8px 18px; }

    .hs-grid{ grid-template-columns: repeat(3, 1fr); }

    .search-card{ padding: 22px 24px; }
    .filter-row{ flex-direction: row; align-items:center; gap: 10px; }
    .msel-btn{ width:auto; min-width:200px; }

    table{ font-size: 13.5px; }
    thead th{ font-size: 11.5px; padding: 12px 10px; }
    tbody td{ padding: 9px 10px; }
  }
</style>
</head>
<body>
<div class="page">

  <nav class="site-nav">
    <div class="site-nav-links">
      <a href="fixtures.html">Fixtures</a>
      <a href="averages.html">Averages</a>
      <a href="stats.html" class="active">Stats</a>
    </div>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>

  <a class="back-link" href="stats.html">&larr; Stats</a>

  <div id="pageMessage" class="page-message" style="display:none;"></div>

  <div id="playerContent" style="display:none;">
    <div class="player-header">
      <div class="player-name" id="playerName"></div>
      <div class="player-sub" id="playerSub"></div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="batting">Batting</div>
      <div class="tab" data-tab="bowling">Bowling</div>
    </div>

    <div class="search-card">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">Team</span>
          <div class="msel" id="teamSelect">
            <button type="button" class="msel-btn"><span class="msel-label">All</span><span class="msel-arrow">▾</span></button>
            <div class="msel-panel"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="battingHSBlock">
      <div class="section-label">Top Batting Performances</div>
      <div class="hs-grid" id="hsBatting"></div>
    </div>
    <div id="bowlingHSBlock" style="display:none;">
      <div class="section-label">Top Bowling Performances</div>
      <div class="hs-grid" id="hsBowling"></div>
    </div>

    <div class="results-label">
      <p class="section-label" id="seasonLabel" style="margin:0;">Batting &amp; Fielding Stats</p>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="card">
      <div class="table-scroll" id="seasonScroll">
        <table>
          <thead><tr id="seasonHead"></tr></thead>
          <tbody id="seasonBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="js/cricket-calc.js"></script>
<script>
let activeTab = 'batting';
let battingRows = [], bowlingRows = [], fieldingRows = [];
let teamOptions = [];
let teamMsel;

const dayMonths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function formatDate(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return `${String(d).padStart(2,'0')} ${dayMonths[m-1]} ${y}`;
}
function fmtAvg(v){ return v == null ? '-' : Number(v).toFixed(1); }

// Collapses a sorted list of seasons into consecutive ranges (e.g. a gap year
// shows as "2021–2022, 2024–2026" rather than a misleading unbroken "2021–2026").
function formatYearRanges(seasons){
  const ranges = [];
  let start = seasons[0], prev = seasons[0];
  for (let i = 1; i <= seasons.length; i++){
    const s = seasons[i];
    if (s === prev + 1){ prev = s; continue; }
    ranges.push(start === prev ? `${start}` : `${start}–${prev}`);
    start = prev = s;
  }
  return ranges.join(', ');
}

function showMessage(text){
  document.getElementById('pageMessage').textContent = text;
  document.getElementById('pageMessage').style.display = 'block';
  document.getElementById('playerContent').style.display = 'none';
}

// ---- Section 1: career-best tiles, respecting the same Team filter as the season table ----
function renderBattingTiles(player, teamFilter){
  const top = CricketCalc.topBattingInnings(battingRows, player, { teams: teamFilter, n: 3 });
  const el = document.getElementById('hsBatting');
  if (!top.length){ el.innerHTML = `<div class="hs-tile empty">No batting innings recorded.</div>`; return; }
  el.innerHTML = top.map((t, i) => `
    <div class="hs-tile">
      <div class="hs-rank">${i + 1}</div>
      <div class="hs-figure">${t.score}${t.notOut ? '<span class="not-out">*</span>' : ''}</div>
      <div class="hs-meta">v <strong>${t.opp}</strong><br>${formatDate(t.date)} &middot; ${t.team} &middot; ${t.venue === 'H' ? 'Home' : 'Away'}</div>
      <a class="hs-link" href="scorecard.html?id=${t.matchId}">Scorecard</a>
    </div>
  `).join('');
}

function renderBowlingTiles(player, teamFilter){
  const top = CricketCalc.topBowlingInnings(bowlingRows, player, { teams: teamFilter, n: 3 });
  const el = document.getElementById('hsBowling');
  if (!top.length){ el.innerHTML = `<div class="hs-tile empty">No bowling performances recorded.</div>`; return; }
  el.innerHTML = top.map((t, i) => `
    <div class="hs-tile">
      <div class="hs-rank">${i + 1}</div>
      <div class="hs-figure">${t.figures}</div>
      <div class="hs-meta">v <strong>${t.opp}</strong><br>${formatDate(t.date)} &middot; ${t.team} &middot; ${t.overs} overs</div>
      <a class="hs-link" href="scorecard.html?id=${t.matchId}">Scorecard</a>
    </div>
  `).join('');
}

// ---- Section 2: season-by-season table, filtered by team, tab-dependent ----
const battingSeasonCols = [
  {key:"season", label:"Season"}, {key:"m", label:"M"}, {key:"i", label:"I"},
  {key:"no", label:"NO"}, {key:"runs", label:"Runs"}, {key:"high", label:"HS", parse:v=>parseFloat(v)},
  {key:"avg", label:"Avg"}, {key:"fours", label:"4s"}, {key:"sixes", label:"6s"},
  {key:"hundreds", label:"100s"}, {key:"fifties", label:"50s"}, {key:"ct", label:"Ct"}, {key:"st", label:"St"},
];
const bowlingSeasonCols = [
  {key:"season", label:"Season"}, {key:"m", label:"M"}, {key:"overs", label:"O"},
  {key:"mdns", label:"Mdns"}, {key:"runs", label:"R"}, {key:"wkts", label:"W"},
  {key:"best", label:"Best", parse:v=>parseInt(v.split("-")[1])}, {key:"fivew", label:"5W"},
  {key:"avg", label:"Avg"}, {key:"econ", label:"Econ"},
];
function currentSeasonCols(){ return activeTab === 'batting' ? battingSeasonCols : bowlingSeasonCols; }

function cellValue(row, col){
  let val = row[col.key];
  if (col.key === "avg" || col.key === "econ") return fmtAvg(val);
  if ((col.key === "high" || col.key === "best") && typeof val === "string" && val.includes("*")) {
    return `${val.replace("*", "")}<span class="not-out">*</span>`;
  }
  return val;
}

let seasonRows = [];
let careerRow = null;

function drawSeasonTable(rows){
  const cols = currentSeasonCols();
  const careerHtml = careerRow
    ? `<tr class="career-row"><td class="season">Career</td>${cols.slice(1).map(c => `<td>${cellValue(careerRow, c)}</td>`).join('')}</tr>`
    : '';
  const bodyHtml = rows.length
    ? rows.map(r => `<tr><td class="season">${r.season}</td>${cols.slice(1).map(c => `<td>${cellValue(r, c)}</td>`).join('')}</tr>`).join('')
    : `<tr class="no-records"><td colspan="${cols.length}">No records to display for this team selection.</td></tr>`;
  document.getElementById('seasonBody').innerHTML = careerHtml + bodyHtml;
}

function renderSeasonHead(){
  const cols = currentSeasonCols();
  const headEl = document.getElementById('seasonHead');
  headEl.innerHTML = cols.map((c,i) => `<th data-i="${i}">${c.label}<span class="arrow">▲</span></th>`).join('');

  let sortState = { i: 0, dir: -1 }; // default: season descending (matches builder output)
  [...headEl.children].forEach((th, i) => {
    th.addEventListener('click', () => {
      const col = cols[i];
      sortState.dir = (sortState.i === i) ? -sortState.dir : -1;
      sortState.i = i;
      [...headEl.children].forEach(h => h.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.arrow').textContent = sortState.dir === 1 ? '▲' : '▼';
      const sorted = [...seasonRows].sort((a, b) => {
        let av = a[col.key], bv = b[col.key];
        if (col.parse) { av = col.parse(av); bv = col.parse(bv); }
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        if (typeof av === 'string' && typeof bv === 'string') return av.localeCompare(bv) * sortState.dir;
        return (av - bv) * sortState.dir;
      });
      drawSeasonTable(sorted);
    });
  });
}

function loadSeasonTable(player){
  const selectedTeams = teamMsel.selected;
  const teamFilter = selectedTeams.length && selectedTeams.length < teamOptions.length ? selectedTeams : null;

  document.getElementById('battingHSBlock').style.display = activeTab === 'batting' ? '' : 'none';
  document.getElementById('bowlingHSBlock').style.display = activeTab === 'bowling' ? '' : 'none';
  document.getElementById('seasonLabel').textContent = activeTab === 'batting' ? 'Batting & Fielding Stats' : 'Bowling Stats';

  if (activeTab === 'batting') {
    renderBattingTiles(player, teamFilter);
    seasonRows = CricketCalc.buildPlayerBattingBySeason(battingRows, fieldingRows, player, { teams: teamFilter });
    const nameFiltered = battingRows.filter(r => r.name === player && (!teamFilter || teamFilter.includes(r.team_name)));
    const fieldFiltered = fieldingRows.filter(r => nameFiltered.some(b => b.player_id === r.player_id) && (!teamFilter || teamFilter.includes(r.team_name)));
    const career = CricketCalc.buildBatting(nameFiltered, fieldFiltered, {});
    careerRow = career[0] || null;
  } else {
    renderBowlingTiles(player, teamFilter);
    seasonRows = CricketCalc.buildPlayerBowlingBySeason(bowlingRows, player, { teams: teamFilter });
    const nameFiltered = bowlingRows.filter(r => r.name === player && (!teamFilter || teamFilter.includes(r.team_name)));
    const career = CricketCalc.buildBowling(nameFiltered, {});
    careerRow = career[0] || null;
  }

  renderSeasonHead();
  drawSeasonTable(seasonRows);
  document.getElementById('resultsCount').textContent = `${seasonRows.length} season${seasonRows.length === 1 ? '' : 's'}`;
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  activeTab = t.dataset.tab;
  loadSeasonTable(currentPlayer);
}));

// ---- Reusable multi-select dropdown (same component as Averages/Stats) ----
function initMultiSelect(root, {options, selected, labelForNone, onChange}){
  const btn = root.querySelector('.msel-btn');
  const labelEl = root.querySelector('.msel-label');
  const panel = root.querySelector('.msel-panel');
  let state = new Set(selected);

  function renderLabel(){
    if(state.size === 0) labelEl.textContent = labelForNone || 'All';
    else if(state.size === options.length) labelEl.textContent = 'All';
    else if(state.size === 1) labelEl.textContent = [...state][0];
    else labelEl.textContent = state.size + ' selected';
  }

  const actions = document.createElement('div');
  actions.className = 'msel-actions';
  actions.innerHTML = '<button type="button" class="msel-action" data-a="all">Select all</button><button type="button" class="msel-action" data-a="clear">Clear</button>';
  panel.appendChild(actions);
  actions.querySelector('[data-a="all"]').addEventListener('click', (e) => { e.stopPropagation(); options.forEach(o=>state.add(o)); sync(); });
  actions.querySelector('[data-a="clear"]').addEventListener('click', (e) => { e.stopPropagation(); state.clear(); sync(); });

  options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'msel-item';
    label.innerHTML = `<input type="checkbox" value="${opt}"> <span>${opt}</span>`;
    panel.appendChild(label);
    const cb = label.querySelector('input');
    cb.checked = state.has(opt);
    cb.addEventListener('change', () => {
      if (cb.checked) state.add(opt); else state.delete(opt);
      renderLabel();
      onChange && onChange([...state]);
    });
  });

  function sync(){
    panel.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = state.has(cb.value); });
    renderLabel();
    onChange && onChange([...state]);
  }

  renderLabel();
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.msel.open').forEach(m => { if (m !== root) m.classList.remove('open'); });
    root.classList.toggle('open');
  });
  document.addEventListener('click', (e) => { if (!root.contains(e.target)) root.classList.remove('open'); });

  return { get selected(){ return [...state]; } };
}

// ---- Horizontal-scroll hint for the season table ----
function initScrollHint(container){
  function update(){
    const table = container.querySelector('table');
    container.classList.toggle('has-scroll', table.scrollWidth - container.clientWidth > 4 && container.scrollLeft < table.scrollWidth - container.clientWidth - 4);
  }
  container.addEventListener('scroll', update);
  window.addEventListener('resize', update);
  update();
}

// ---- Theme toggle (light/dark), persisted across pages via localStorage ----
function getEffectiveTheme(){
  const attr = document.documentElement.getAttribute('data-theme');
  if (attr) return attr;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = getEffectiveTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('barwellcc-theme', next);
});

let currentPlayer = null;

(async function init(){
  const player = new URLSearchParams(location.search).get('name');
  if (!player) { showMessage('No player selected.'); return; }
  currentPlayer = player;

  const [batRows, bowlRows, fieldRows] = await Promise.all([
    fetch('data/batting.json').then(r => r.json()),
    fetch('data/bowling.json').then(r => r.json()),
    fetch('data/fielding.json').then(r => r.json()),
  ]);
  battingRows = batRows;
  bowlingRows = bowlRows;
  fieldingRows = fieldRows;

  const ownBatting = battingRows.filter(r => r.name === player);
  const ownBowling = bowlingRows.filter(r => r.name === player);
  if (!ownBatting.length && !ownBowling.length) {
    showMessage(`No records found for "${player}".`);
    return;
  }

  document.getElementById('playerContent').style.display = 'block';
  document.getElementById('playerName').textContent = player;

  const seasons = [...new Set([...ownBatting, ...ownBowling].map(r => r.season))].sort((a,b) => a-b);
  document.getElementById('playerSub').textContent = seasons.length
    ? `Years Active: ${formatYearRanges(seasons)}`
    : '';

  teamOptions = [...new Set([...ownBatting, ...ownBowling].map(r => r.team_name))].sort();
  teamMsel = initMultiSelect(document.getElementById('teamSelect'), {
    options: teamOptions, selected: teamOptions, onChange: () => loadSeasonTable(player)
  });

  loadSeasonTable(player);
  initScrollHint(document.getElementById('seasonScroll'));
})();
</script>
